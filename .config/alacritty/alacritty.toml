[font]
size = 16.7

[colors.primary]
foreground = '#000000'
background = '#ffffff'

[[keyboard.bindings]]
key = "B"
mods = "Command"
chars = "\u0002"

[[keyboard.bindings]]
key = "1"
mods = "Command"
chars = "\u00021"

[[keyboard.bindings]]
key = "2"
mods = "Command"
chars = "\u00022"

[[keyboard.bindings]]
key = "3"
mods = "Command"
chars = "\u00023"

[[keyboard.bindings]]
key = "4"
mods = "Command"
chars = "\u00024"

[[keyboard.bindings]]
key = "5"
mods = "Command"
chars = "\u00025"

[[keyboard.bindings]]
key = "6"
mods = "Command"
chars = "\u00026"

[[keyboard.bindings]]
key = "7"
mods = "Command"
chars = "\u00027"

[[keyboard.bindings]]
key = "8"
mods = "Command"
chars = "\u00028"

[[keyboard.bindings]]
key = "9"
mods = "Command"
chars = "\u00029"

[[keyboard.bindings]]
key = "Z"
mods = "Command"
chars = "\u0002z"

# Map Cmd+Shift+5 (%) to Split Vertical
[[keyboard.bindings]]
key = "5"
mods = "Command|Shift"
chars = "\u0002%"

# Map Cmd+Shift+' (") to Split Horizontal
[[keyboard.bindings]]
key = "'"
mods = "Command|Shift"
chars = "\u0002\""
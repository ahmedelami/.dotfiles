# Numbering preferences
set -g base-index 1
setw -g pane-base-index 1
# Keep windows numbered by position (no gaps after closing one)
set -g renumber-windows on

# Simplified Status: Just show the relevant name.
# If it's a clone (session != group), show the Group Name (Project) to keep it clean.
# Otherwise, show the Session Name.
set -g status-left "[#{?session_group,#{session_group},#S}] "
set -g status-left-length 40

# "Stealth Mode" Session List
# Use a clean, simple format: "SessionName (N windows)"
# Filter: Hide sessions tagged with @hidden=1 (Deterministic)
# Format: Just show the window count (The name is auto-shown on the left)
bind-key s choose-tree -s -f "#{!=:#{@hidden},1}" -F "#{session_windows} windows" -O name
bind-key w choose-tree -w -f "#{!=:#{@hidden},1}" -F "#{session_windows} windows" -O name

# Rearrange Windows
# Press Prefix + < to move window left
bind-key < swap-window -t -1 \; select-window -t -1
# Press Prefix + > to move window right
bind-key > swap-window -t +1 \; select-window -t +1

# Swap window with prefix + Shift + <number>
bind-key ! swap-window -t 1 \; select-window -t 1
bind-key @ swap-window -t 2 \; select-window -t 2
bind-key '#' swap-window -t 3 \; select-window -t 3
bind-key '$' swap-window -t 4 \; select-window -t 4
bind-key % swap-window -t 5 \; select-window -t 5
bind-key ^ swap-window -t 6 \; select-window -t 6
bind-key & swap-window -t 7 \; select-window -t 7
bind-key * swap-window -t 8 \; select-window -t 8
bind-key ( swap-window -t 9 \; select-window -t 9
bind-key ) swap-window -t 10 \; select-window -t 10

# Press Prefix + . (dot) to swap with a specific number
# Fix: Save input to a global env variable first, then use it. Avoids shell escaping hell.
bind-key . command-prompt -p "Swap with window:" "set-environment -g TMUX_SWAP_TARGET '%%'; run-shell -b 'tmux swap-window -t \"\$TMUX_SWAP_TARGET\" && tmux select-window -t \"\$TMUX_SWAP_TARGET\"'"

# --- SAFETY & AUTOMATION ---

# Enforce View Independence (Server-Side Hook)
# If a client attaches to a session that already has a viewer, 
# this script IMMEDIATELY moves them to a new independent clone.
set-hook -g client-attached 'run-shell "$HOME/.tmux/scripts/enforce_independence.sh"'
set-hook -g client-session-changed 'run-shell "$HOME/.tmux/scripts/enforce_independence.sh"'

# Auto-name new sessions based on the total session count (e.g., 4th session -> "4").
# Only runs on creation to preserve custom names of existing sessions.
# Clear existing hooks first to prevent pile-up
# set-hook -u session-created
# set-hook -g session-created "run-shell -b \"$HOME/tmux-renumber-sessions.sh '#{session_id}'\""

# Force the tmux prefix back to the default Ctrl-b combo
set -g prefix C-b
bind-key C-b send-prefix
unbind C-a

set -g mouse on

# Fix issue where multiple clients viewing the same session are constrained to the smallest client's size
setw -g aggressive-resize on

# --- NAVIGATION & RESIZING ---
# Super short repeat timeout (150ms) - effectively eliminates "swallowed" keys
# while still allowing you to tap the resize keys.
set -g repeat-time 150
set -g history-limit 10000
set -g mode-keys vi
set -g cursor-style block
set -g cursor-colour black
set -g terminal-overrides 'linux*:AX@,*:Ss=\E[2 q:Se=\E[2 q:cvvis=\E[?12l\E[?25h'
set -g terminal-features 'xterm*:clipboard:ccolour:focus:title'
set -ga terminal-features 'screen*:title'
set -ga terminal-features 'rxvt*:ignorefkeys'

# Resize panes with y, u, i, o (Right-hand cluster)
# y = Left, u = Down, i = Up, o = Right
bind -r y resize-pane -L 5
bind -r u resize-pane -D 5
bind -r i resize-pane -U 5
bind -r o resize-pane -R 5

# --- COPY MODE (VIM-LIKE) ---
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind -T copy-mode WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi i send -X cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi q send -X cancel

# --- THEME / UI ---
# Transparent status bar background
set -g status-style bg=default

# Spacing between buttons
set -g window-status-separator "  "

# Copy-mode colors (keep text dark on light background)
set -g mode-style "fg=black,bg=colour252"

# Inactive Button: Sky Blue background, Black text (Distinct, colorful but clean)
set -g window-status-format "#[bg=colour117,fg=black] #I:#W "

# Active Button: Mode-based background color (Normal/Insert/Visual)
set -g window-status-current-format "#{?pane_in_mode,#[bg=colour208]#[fg=black]#[bold] #I:#W VIM:#{?selection_active,VISUAL,NORMAL} ,#{?#{==:#{@vim_mode},VIM:INSERT},#[bg=colour34]#[fg=black]#[bold] #I:#W #{@vim_mode} ,#{?#{==:#{@vim_mode},VIM:VISUAL},#[bg=colour208]#[fg=black]#[bold] #I:#W #{@vim_mode} ,#{?#{==:#{@vim_mode},VIM:NORMAL},#[bg=black]#[fg=white]#[bold] #I:#W #{@vim_mode} ,#[bg=black]#[fg=white]#[bold] #I:#W }}}} "

# Clean up the left status color (Deep Blue Label - Distinct from buttons)
set -g status-left-style fg=colour33,bold

# Remove the noisy information on the right (Date, Time, Hostname)
# Replace with Custom Odometer (Total Terminal Time)
set -g status-right "#($HOME/.tmux/odometer/update.sh)"
set -g status-right-length 70
set -g status-interval 1

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore sessions on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Easy save/restore keybindings
# Save: Ctrl-b then K (for \"Keep\")
# Restore: Ctrl-b then J (for \"Jump back\")
bind-key K run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh \; display-message "Session saved!"
bind-key J run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh \; display-message "Session restored!"

# Initialize TPM (keep this line at the very bottom)
run-shell ~/.tmux/plugins/tpm/tpm

set -g focus-events on

# Numbering preferences
set -g base-index 1
setw -g pane-base-index 1
# Keep windows numbered by position (no gaps after closing one)
set -g renumber-windows on

# Show the Group Name (session_group) instead of the unique Session Name (session_name)
# If there is no group, fall back to session_name (#S).
set -g status-left "[#{?session_group,#{session_group},#S}] "
set -g status-left-length 40

# "Stealth Mode" Session List
# 1. Filter (-f): Hide shadow clones (name != group)
# 2. Format (-F): Show only "Name: X windows" (hide group info)
bind-key s choose-tree -s -f "#{==:#{session_name},#{session_group}}" -F "#{session_name}: #{session_windows} windows" -O name

# Auto-name new sessions based on the total session count (e.g., 4th session -> "4").
# Only runs on creation to preserve custom names of existing sessions.
set-hook -ga session-created "run-shell -b \"$HOME/tmux-renumber-sessions.sh '#{session_id}'\""

# Force the tmux prefix back to the default Ctrl-b combo
set -g prefix C-b
bind-key C-b send-prefix
unbind C-a

set -g mouse on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore sessions on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Easy save/restore keybindings
# Save: Ctrl-b then K (for \"Keep\")
# Restore: Ctrl-b then J (for \"Jump back\")
bind-key K run-shell ~/.tmux/plugins/tmux-resurrect/scripts/save.sh \; display-message "Session saved!"
bind-key J run-shell ~/.tmux/plugins/tmux-resurrect/scripts/restore.sh \; display-message "Session restored!"

# Initialize TPM (keep this line at the very bottom)
run-shell ~/.tmux/plugins/tpm/tpm
